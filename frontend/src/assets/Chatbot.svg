<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bot" x1="20" y1="18" x2="44" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="64" height="64" rx="32" fill="url(#bg)"/>
  <!-- Bot head -->
  <rect x="18" y="22" width="28" height="20" rx="10" fill="url(#bot)"/>
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="14" r="2.5" fill="#A5B4FC"/>
  <!-- Left eye -->
  <circle cx="25" cy="31" r="3" fill="#6366F1"/>
  <circle cx="26" cy="30" r="1" fill="white"/>
  <!-- Right eye -->
  <circle cx="39" cy="31" r="3" fill="#6366F1"/>
  <circle cx="40" cy="30" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M27 36 Q32 40 37 36" stroke="#6366F1" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Chat bubble (bottom-right) -->
  <rect x="38" y="40" width="16" height="12" rx="6" fill="white" opacity="0.9"/>
  <circle cx="43" cy="46" r="1.2" fill="#6366F1"/>
  <circle cx="46" cy="46" r="1.2" fill="#8B5CF6"/>
  <circle cx="49" cy="46" r="1.2" fill="#A5B4FC"/>
</svg>
